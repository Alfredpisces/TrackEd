<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackEd | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
    <div class="bg-blue-900 text-white px-8 py-6 text-center">
      <div class="flex items-center justify-center gap-3">
        <i class="fa-solid fa-school text-2xl"></i>
        <h1 class="text-2xl font-bold tracking-wide">TrackEd</h1>
      </div>
      <p class="text-blue-100 text-sm mt-2">Centralized School Information System</p>
    </div>

    <form class="px-8 py-7 space-y-5">
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
        <input id="email" type="email" placeholder="name@school.edu.ph" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-700" />
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-700" />
      </div>

      <div>
        <label for="role" class="block text-sm font-semibold text-slate-700 mb-1">Role</label>
        <select id="role" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 bg-white focus:outline-none focus:ring-2 focus:ring-blue-700">
          <option>Admin</option>
          <option>School Head</option>
          <option>Counselor</option>
          <option>Teacher</option>
        </select>
      </div>

      <a href="dashboard.html" class="block w-full rounded-lg bg-blue-900 hover:bg-blue-800 text-white text-center font-semibold py-2.5 transition-colors">
        Login
      </a>
    </form>
  </div>
</body>
</html>
