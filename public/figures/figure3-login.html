<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 3 – TrackEd Login Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background-color: #1E3A8A;
      background-image:
        linear-gradient(rgba(30,58,138,0.82), rgba(30,58,138,0.82)),
        url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=1400&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- Login Card: 450 × 500px centred -->
  <div style="width:450px; min-height:500px;"
       class="bg-white rounded-lg shadow-2xl flex flex-col overflow-hidden">

    <!-- Top branding strip -->
    <div class="bg-[#1E3A8A] py-6 text-center">
      <p class="text-white text-2xl font-bold tracking-widest">TrackEd</p>
    </div>

    <!-- Card body -->
    <div class="flex-1 px-10 py-8 flex flex-col gap-5">

      <!-- Heading -->
      <h2 class="text-center text-gray-800 font-semibold" style="font-size:24px;">
        Welcome Back
      </h2>

      <!-- Email input -->
      <div class="relative">
        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
          <i class="fa-regular fa-envelope text-sm"></i>
        </span>
        <input type="email"
               placeholder="DepEd Email Address"
               class="w-full border border-gray-300 rounded-md py-2.5 pl-9 pr-4 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A8A]" />
      </div>

      <!-- Password input -->
      <div class="relative">
        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
          <i class="fa-solid fa-lock text-sm"></i>
        </span>
        <input type="password"
               placeholder="Password"
               class="w-full border border-gray-300 rounded-md py-2.5 pl-9 pr-10 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A8A]" />
        <span class="absolute inset-y-0 right-3 flex items-center text-gray-400 cursor-pointer">
          <i class="fa-regular fa-eye-slash text-sm"></i>
        </span>
      </div>

      <!-- Forgot Password -->
      <div class="text-right -mt-3">
        <a href="#" class="text-xs text-[#1E3A8A] hover:underline">Forgot Password?</a>
      </div>

      <!-- Log In button -->
      <button class="w-full bg-[#1E3A8A] text-white font-bold py-3 rounded-md text-sm tracking-wide hover:bg-blue-800 transition">
        Log In
      </button>

    </div>
  </div>

  <!-- Figure caption -->
  <div class="fixed bottom-4 left-0 right-0 text-center text-white text-xs opacity-70">
    Figure 3: TrackEd System Login Screen
  </div>
</body>
</html>
