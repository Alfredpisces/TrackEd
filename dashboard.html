<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackEd | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="min-h-screen flex">
    <aside class="w-64 bg-blue-900 text-blue-100 p-5 hidden md:block">
      <div class="flex items-center gap-2 mb-8">
        <i class="fa-solid fa-school text-xl"></i>
        <h1 class="text-xl font-bold">TrackEd</h1>
      </div>
      <nav class="space-y-2">
        <a href="dashboard.html" class="block px-3 py-2 rounded-lg bg-blue-800 text-white font-medium"><i class="fa-solid fa-chart-line mr-2"></i>Dashboard</a>
        <a href="teacher-performance.html" class="block px-3 py-2 rounded-lg hover:bg-blue-800"><i class="fa-solid fa-chalkboard-user mr-2"></i>Teacher Performance</a>
        <a href="student-behavior.html" class="block px-3 py-2 rounded-lg hover:bg-blue-800"><i class="fa-solid fa-user-shield mr-2"></i>Student Behavior</a>
        <a href="property-inventory.html" class="block px-3 py-2 rounded-lg hover:bg-blue-800"><i class="fa-solid fa-box-archive mr-2"></i>Property Inventory</a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-blue-800"><i class="fa-solid fa-gear mr-2"></i>Settings</a>
      </nav>
    </aside>

    <main class="flex-1">
      <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
        <h2 class="text-xl font-bold text-blue-900">School Head Dashboard</h2>
        <div class="flex items-center gap-4">
          <button class="w-10 h-10 rounded-full bg-slate-100 text-slate-600"><i class="fa-regular fa-bell"></i></button>
          <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full bg-blue-900 text-white grid place-items-center font-semibold">SH</div>
            <div>
              <p class="text-sm font-semibold">Maria Santos</p>
              <p class="text-xs text-slate-500">School Head</p>
            </div>
          </div>
        </div>
      </header>

      <section class="p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <article class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <p class="text-sm text-slate-500">Total Students</p>
            <p class="text-3xl font-bold text-blue-900 mt-2">1,284</p>
          </article>
          <article class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <p class="text-sm text-slate-500">Unresolved Incidents</p>
            <p class="text-3xl font-bold text-amber-600 mt-2">18</p>
          </article>
          <article class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <p class="text-sm text-slate-500">Pending Clearances</p>
            <p class="text-3xl font-bold text-rose-600 mt-2">9</p>
          </article>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <h3 class="font-semibold text-slate-700 mb-4">DLL Compliance by Department</h3>
            <canvas id="dllChart" height="170"></canvas>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
            <h3 class="font-semibold text-slate-700 mb-4">Behavioral Incidents by Grade Level</h3>
            <canvas id="behaviorChart" height="170"></canvas>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    if (window.Chart) {
      new Chart(document.getElementById('dllChart'), {
        type: 'bar',
        data: {
          labels: ['Math', 'Science', 'English', 'Filipino', 'MAPEH'],
          datasets: [{
            label: 'Compliance %',
            data: [94, 88, 91, 96, 86],
            backgroundColor: '#1e3a8a',
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, max: 100 } }
        }
      });

      new Chart(document.getElementById('behaviorChart'), {
        type: 'pie',
        data: {
          labels: ['Grade 7', 'Grade 8', 'Grade 9', 'Grade 10'],
          datasets: [{
            data: [22, 18, 15, 12],
            backgroundColor: ['#1e3a8a', '#3b82f6', '#93c5fd', '#dbeafe']
          }]
        },
        options: { responsive: true }
      });
    }
  </script>
</body>
</html>
